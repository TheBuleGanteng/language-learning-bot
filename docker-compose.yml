services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lang
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: language_learning
    ports:
      # Host 5433 -> container 5432 (host 5432 may already be in use by an
      # existing local Postgres on this machine).
      - "5433:5432"
    volumes:
      - lang_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lang -d language_learning"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lang_pg_data:
